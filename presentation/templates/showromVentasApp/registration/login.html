{% load static %}
<!DOCTYPE html>
<html data-bs-theme="light" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>Studio GO</title>
  <link rel="icon" type="image/x-icon" href="{% static 'gestionPedidos/img/led_studio_icon.ico' %}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'gestionPedidos/css/styles.min.css' %}">
</head>

<body>
  <!-- Start: Login Form Basic -->
  <section class="position-relative py-4 py-xl-5">
    <div class="container">
      <div class="row mb-5">
        <div class="col-md-8 col-xl-6 text-center mx-auto">
          <h2>LED Studio</h2>
          <p class="w-lg-50" style="font-size: 26px;">Studio GO</p>
        </div>
      </div>
      <div class="row d-flex justify-content-center">
        <div class="col-md-6 col-xl-4">
          <div class="card mb-5">
            <div class="card-body d-flex flex-column align-items-center">
              <div class="bs-icon-xl bs-icon-circle bs-icon-primary bs-icon my-4"><svg
                  xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" fill="currentColor" viewBox="0 0 16 16"
                  class="bi bi-person">
                  <path
                    d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6m2-3a2 2 0 1 1-4 0 2 2 0 0 1 4 0m4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4m-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664z">
                  </path>
                </svg></div>
              <div class="w-100">
                <form class="text-center" id="LoginForm" method="POST" action="{% url 'login' %}">
                  {% csrf_token %}
                  <input type="hidden" name="next" value="{{ request.GET.next }}">
                  <div class="mb-3"><input class="form-control" type="text" id="user" name="username"
                      placeholder="Usuario"></div>
                  <div class="mb-3"><input class="form-control" type="password" id="pass" name="password"
                      placeholder="Contraseña"></div>
                  <div class="mb-3">
                    <button class="btn btn-primary d-block w-100" type="submit">Ingresar</button>
                  </div>
                  {% if form.errors %}
                  <p class="text-danger">Usuario o contraseña incorrectos. Inténtalo de nuevo.</p>
                  {% endif %}
                </form>

                <div class="d-flex align-items-center my-3">
                  <hr class="flex-grow-1 m-0">
                  <span class="px-2 text-muted small">o</span>
                  <hr class="flex-grow-1 m-0">
                </div>

                <a class="btn btn-outline-secondary d-flex align-items-center justify-content-center gap-2 w-100"
                   href="{% url 'google_login' %}{% if request.GET.next %}?next={{ request.GET.next|urlencode }}{% endif %}">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                  </svg>
                  <span>Iniciar sesión con Google</span>
                </a>
                {% if google_error %}
                <p class="text-danger mt-3 mb-0">{{ google_error }}</p>
                {% endif %}
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section><!-- End: Login Form Basic -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
